name: SAST (Static Analysis)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: |
          set -o pipefail
          semgrep scan \
            --config auto \
            --exclude-rule python.django.security.audit.django-rest-framework.missing-throttle-config.missing-throttle-config \
            --error \
            2>&1 | tee semgrep-results.txt

      - name: Upload Semgrep Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.txt
          retention-days: 7
